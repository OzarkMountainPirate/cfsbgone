services:
  socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: socket-proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      # Default-deny. Only the endpoints Traefik actually needs are turned on.
      # 1 = allow, 0 = deny. Anything not listed stays denied.
      CONTAINERS: 1       # Traefik reads container labels for dynamic config
      SERVICES: 1         # needed if you ever use Swarm services
      TASKS: 1            # needed if you ever use Swarm services
      NETWORKS: 1         # Traefik resolves container networks
      # Everything dangerous stays off:
      POST: 0             # no write operations at all
      EXEC: 0             # cannot exec into containers
      VOLUMES: 0
      IMAGES: 0
      INFO: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
    volumes:
      # The proxy is the ONLY thing that touches the real socket.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy

networks:
  proxy:
    external: true
