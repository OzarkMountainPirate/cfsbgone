services:
  openvpn:
    image: kylemanna/openvpn
    container_name: openvpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      # PKI and config live here. Generated by ovpn_genconfig + ovpn_initpki
      # before the container is brought up for the first time.
      - ./data:/etc/openvpn
    networks:
      - proxy
    # No port mapping when running behind sslh — the openvpn container
    # is reachable only inside the Docker network at openvpn:1194.
    #
    # If running VPN-only (no sslh), uncomment:
    # ports:
    #   - "443:1194/tcp"

networks:
  proxy:
    external: true
