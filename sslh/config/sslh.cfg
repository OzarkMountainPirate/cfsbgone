# sslh configuration
#
# Demultiplexes TCP/443 between OpenVPN and Traefik based on the first
# bytes of each connection.
#
# Probes are tried in the order listed below.
# `on-timeout` is the fallback for connections that don't send identifiable
# bytes within the timeout window.

verbose: 0;
foreground: true;
inetd: false;
numeric: false;
transparent: false;
timeout: 5;

listen:
(
  { host: "0.0.0.0"; port: "443"; }
);

protocols:
(
  # OpenVPN probe matches the OpenVPN packet opcode in the first byte.
  # Works with tls-crypt because the opcode itself is not encrypted.
  { name: "openvpn"; host: "openvpn"; port: "1194"; },
  
  # TLS probe matches the standard TLS record header (0x16 0x03 0x0X).
  # `proxyprotocol: 2` makes sslh prepend a PROXY v2 header so Traefik
  # sees the real client IP instead of sslh's container IP.
  { name: "tls";     host: "traefik"; port: "8443"; proxyprotocol: 2; }
);

# Fallback: connections that don't send identifiable bytes within the
# timeout get routed to TLS. Browsers occasionally pause before sending
# the ClientHello, and we'd rather they hit Traefik than get dropped.
on-timeout: "tls";
